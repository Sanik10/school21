services:
  app:
    image: simpledocker:4.2
    networks:
      - internal
    expose:
      - "81"

  proxy:
    image: nginx:alpine
    depends_on:
      - app
    networks:
      - internal
    ports:
      - "80:8080"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  internal:
    driver: bridge
